services:
  postgres:
    image: postgres:16-alpine
    container_name: parkuj-my-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: parkuj-my-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: parkuj-my-frontend
    restart: unless-stopped
    environment:
      # Vite proxuje /api do backendu po wewnetrznej sieci compose
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app          # bind-mount kodu = hot reload
      - /app/node_modules        # zachowaj node_modules z obrazu (nie nadpisuj bind-mountem)
    depends_on:
      - backend

volumes:
  postgres_data:
