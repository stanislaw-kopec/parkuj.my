spring.application.name=application
# Parametry bazy nadpisywalne zmiennymi srodowiskowymi (Docker ustawia host "postgres").
# Domyslnie localhost — lokalny dev bez Dockera dziala bez zmian.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
